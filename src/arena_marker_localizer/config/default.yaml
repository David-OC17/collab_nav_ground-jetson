marker_localizer_service:
  ros__parameters:
    # ── Set automatically by the launch file to config/calibration.yaml ──
    intrinsics_path: ""

    intrinsics:
      camera_matrix_key: "camera_matrix"
      dist_key: "dist_coeff"

    # ── ArUco dictionaries to scan, format "DICT_NAME:size_m" ──
    dictionaries:
      - "DICT_4X4_50:0.135"

    # ── Frame quality gates ──
    quality:
      blur_thresh: 60.0
      artifact_thresh: 2.0

    # ── Per-detection quality gate ──
    max_reproj_err_px: 4.0

    # ── Static transform: drone-body-frame from camera-frame ──
    #    (camera mounting position + rotation from OpenCV camera to body)
    # Manually set
    # T_drone_from_cam:
    #   x: 0.035 # cm
    #   y: 0.0
    #   z: 0.0
    #   roll: 3.14159 # flip camera +Z to point along drone -Z
    #   pitch: 0.0
    #   yaw: 0.0
    
    # Calibrated from video
    T_drone_from_cam:
      x    : -0.0350000
      y    : 0.000000
      z    : 0.000000
      roll : 2.209156   # 126.575 deg
      pitch: -0.118407   # -6.784 deg
      yaw  : 0.045956   # 2.633 deg

    # ── Static transform: map-frame from OptiTrack-frame ──
    #    (where the OccupancyGrid origin sits in the OptiTrack frame)
    T_map_from_opti:
      x: 1.93 # cm
      y: 1.91 # cm
      z: 0.0
      roll: 0.0
      pitch: 0.0
      yaw: 1.570795 # 90.000 deg

    optitrack:
      yaw_axis: "z"     # "z" or "y"
      x_dir: 1         # +1 or -1
      y_dir: 1

    aggregation:
      mad_k: 3.5
      min_observations: 50
      max_iterations: 100
      convergence_eps: 1.0e-5

    max_obs_per_marker: 200

    arena:
      width_m: 3.85
      height_m: 3.85

    grid:
      resolution_m_per_cell: 0.05

    debug:
      output_path: "/tmp/marker_localizer_debug.png"
      px_per_cell: 12

    # ── Parallel processing ────────────────────────────────────────────
    # max_workers: number of threads processing frames in parallel.
    #   Jetson Orin Nano has 6 cores; 5 leaves one free for the main
    #   thread (frame decoding + result merging) and the OS.
    # frame_stride: process every Nth frame. At 30 fps, stride=2 gives
    #   ~15 frames/s of observations — still well above min_observations=50
    #   for a 3-minute flight (~2700 observations at stride=2).
    processing:
      max_workers: 5
      frame_stride: 1
      # Drop frames where OptiTrack speed exceeds this [m/s]. 0.0 = disabled.
      # At 0.15 m/s a typical multirotor tilts ~3-4 deg; at 2 m altitude that
      # is ~10 cm of systematic marker position error per frame.
      max_drone_velocity_m_s: 0.15

    verbose: false
