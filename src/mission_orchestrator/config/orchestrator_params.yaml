# mission_orchestrator configuration
# All paths must be absolute. All timeouts are in seconds.
# ─────────────────────────────────────────────────────────────────────────────

orchestrator:

  # ── Raspberry Pi ────────────────────────────────────────────────────────
  rasp:
    ip: "10.42.0.50"
    user: "root"
    password: "root"                       # Set before running
    amr_service: "amr_bringup"             # systemd service name
    amr_service_start_timeout_sec: 15.0    # How long to wait for active state
    ping_count: 3
    ping_timeout_sec: 2.0                # Timeout per ping attempt
    ssh_connect_timeout_sec: 10.0

  # ── IMU readiness ───────────────────────────────────────────────────────
  imu:
    topic: "/amr/imu/data_raw"
    message_count: 10                  # Number of messages to wait for
    timeout_sec: 60.0

  # ── OptiTrack ───────────────────────────────────────────────────────────
  optitrack:
    topic: "/optitrack/rigid_body"
    expected_frame_id: "drone113"       # header.frame_id must match this
    max_stamp_age_sec: 1.0              # Message must be this fresh
    check_timeout_sec: 30.0             # How long to wait for a message
    retry_delay_sec: 3.0                # Delay before re-checking after launching client

  # ── Tello WiFi connection ────────────────────────────────────────────────
  tello_wifi:
    interface: "wlx14ebb67dae0b"          # WiFi adapter ifname
    ssid: "TELLO-594992"                  # Tello access-point SSID
    scan_retries: 3                       # Scan attempts before giving up
    connect_timeout_sec: 30.0             # Timeout for nmcli connect call

  # ── Tello drone ─────────────────────────────────────────────────────────
  drone:
    state_topic: "/drone/state"          # std_msgs/Int32  (-1..4)
    camera_topic: "/camera/image_raw"
    battery_topic: "/battery_state"
    cmd_vel_topic: "/cmd_vel"
    battery_min_pct: 60.0               # Minimum battery % (0-100 scale)
    camera_timeout_sec: 30.0
    battery_timeout_sec: 10.0
    # State transition timeouts — each is the max time allowed to REACH that
    # state from the previous one (i.e. the duration limit of the preceding phase).
    state1_timeout_sec: 100.0  # max time to reach state 1 (takeoff + fly to home)
    state2_timeout_sec: 60.0   # max time to reach state 2 (stabilise at home)
    state3_timeout_sec: 300.0  # max time to reach state 3 = MAX TRAJECTORY DURATION
    state4_timeout_sec: 90.0   # max time to reach state 4 (return home + land)
    driver_startup_delay_sec: 15.0      # Fixed wait after tello_driver launch before preflight
    land_wait_sec: 40.0                  # Time to keep tello_driver alive after /land is sent
  # ── Video output files ───────────────────────────────────────────────────
  video:
    dir: "/home/jetson/collab_nav_ground-jetson/video"  # Directory where the drone controller writes outputs
    video_filename: "scan.mp4"
    telemetry_filename: "telemetry.csv"
    file_appear_timeout_sec: 180.0       # Max time to wait for files to appear and be fresh after landing
    max_age_sec: 300.0                   # Files must have been written within this many seconds

  # ── ArUco pose publication ───────────────────────────────────────────────
  aruco:
    amr_marker_id: 0                     # MarkerPose.id for the AMR
    goal_marker_id: 2                    # MarkerPose.id for the goal
    amr_pose_topic: "/aruco/amr/pose"
    goal_pose_topic: "/aruco/goal/pose"

  # ── AMR Aruco localizer (stage 08) ───────────────────────────────────────
  amr_localizer:
    pose_topic: "/aruco_pose"
    ready_timeout_sec: 30.0
    # used only when vslam.enabled (IR stream from the VSLAM RealSense):
    vslam_image_topic: "/camera/infra1/image_rect_raw"
    vslam_camera_info_topic: "/camera/infra1/camera_info"
    vslam_camera_frame: "camera_infra1_optical_frame"

  # ── trajectory_planner ──────────────────────────────────────────────────
  trajectory_planner:
    ready_topic: "/trajectory_planner2/path"  # topic the node advertises on startup
    ready_timeout_sec: 30.0

  # ── Map-quality classifier (stage 04.c) ──────────────────────────────────
  # Scores the stitched map from the BuildArenaMap diagnostic features. PASS →
  # publish /drone/map + goal pose; FAIL → dump the map and run frontier
  # exploration. enabled=false skips the gate (always PASS).
  map_classifier:
    enabled: true
    model_dir: "/home/jetson/collab_nav_ground-jetson/src/arena_map_builder/sweep/stitching/models/latest"

  # ── Frontier-exploration fallback (stages 09.b + 10.a) ───────────────────
  # Launched only when the map FAILS classification. astar_planner2 +
  # spline_follower are NOT launched here — they come from stage 09 (the planner
  # is pointed at fusion_map_topic in fail mode).
  frontier:
    start_topic: "/map_fail_fallback/start"   # Bool — explorer_controller trigger
    start_ready_timeout_sec: 30.0             # wait for subscriber before publishing
    fusion_map_topic: "/fusion/map"           # planner map_topic in fail mode (published by stage 08)
    odom_topic: "/amr/ekf/odom"               # EKF odometry for frontier_explorer
    world_frame: "world"                      # root TF frame (alignment_node publishes world→odom)
    slam_map_topic: "/slam/map"               # frontier-detection map (TRANSIENT_LOCAL)
    image_topic: "/camera/camera/color/image_raw"        # D435i RGB
    camera_info_topic: "/camera/camera/color/camera_info"
    marker_size_m: 0.13                       # physical ArUco side length [m]
    aruco_dict: "DICT_4X4_50"
    rviz: false
    # target_marker_id is taken from aruco.goal_marker_id

  # ── oradar lidar ────────────────────────────────────────────────────────
  oradar:
    scan_topic: "/scan"
    ready_timeout_sec: 30.0

  # ── Arena marker localizer ───────────────────────────────────────────────
  marker_localizer:
    workspace_path: "/home/jetson/collab_nav_ground-jetson"  # Used to find default.yaml
    service_name: "/localize_markers"
    service_timeout_sec: 300.0
    server_ready_timeout_sec: 60.0

  # ── Arena map builder ────────────────────────────────────────────────────
  map_builder:
    background_image_path: "/home/jetson/collab_nav_ground-jetson/src/arena_map_builder/config/background.png"
    action_name: "build_arena_map"
    action_timeout_sec: 30000.0
    server_ready_timeout_sec: 30.0
    drone_map_topic: "/drone/map"

    # ── Template grid (fail-mode empty map) ───────────────────────────────
    # Published to /drone/map when the stitched map fails classification, so
    # downstream consumers have a bordered empty arena to fall back on.
    template_grid:
      arena_width_m: 4.0
      arena_height_m: 4.0
      resolution_m_per_cell: 0.05
      wall_occ: 100
      free_occ: 0
      border_cells: 2
      frame_id: "world"

    # ── Online vs offline stitching ───────────────────────────────────────
    # online: true  → bring the map-builder server up in ONLINE mode before the
    #   flight; it stitches live from the drone's processed-image stream during
    #   the trajectory (hiding stitch latency behind the flight). The
    #   BuildArenaMap action then runs only the offline stages (transfer +
    #   occupancy). The orchestrator drives this via the server's online_start /
    #   online_stop services and launches the controller with publish_processed.
    # online: false → the server stitches from the saved scan.mp4 after the
    #   flight; the processed-image stream is ignored.
    online: true                          # default: stitch live during the flight
    online_image_topic: "/camera/image_proc"
    online_start_service: "/build_arena_map_server/online_start"
    online_stop_service: "/build_arena_map_server/online_stop"
    online_start_timeout_sec: 60.0
    online_stop_timeout_sec: 180.0

  # ── Isaac ROS Visual SLAM (cuVSLAM) — stage 05 ──────────────────────────
  vslam:
    enabled: false                       # gate stage 05 (VSLAM bringup)
    odometry_topic: "/visual_slam/tracking/odometry"
    odometry_timeout_sec: 30.0           # max wait for the first odometry msg
    realsense_usb_id: "8086:0b3a"        # Intel RealSense D435i USB id (lsusb)
    container_name: "isaac_ros_vslam"    # informational; the script owns it
    start_timeout_sec: 120.0             # max wait for start_vslam.sh to return
    start_script: "/home/jetson/collab_nav_ground-jetson/src/mission_orchestrator/scripts/start_vslam.sh"

  # ── Rosbag recording ────────────────────────────────────────────────────
  rosbag:
    enabled: false
    output_dir: "/tmp/mission_orchestrator_logs"  # bag folder created here
    topics: []                                    # empty = record all topics (-a)
    # topics:
    #   - /imu/data_raw
    #   - /optitrack/rigid_body
    #   - /scan
    #   - /drone/state
    #   - /aruco/amr/pose
    #   - /aruco/goal/pose
    #   - /drone/map

  # ── Observer (post-handoff periodic state logging) ──────────────────────
  observer:
    rate_hz: 1.0                         # Log frequency once mission stages complete
    topics:
      - /amr/reference
      - /amr/ekf/odom
      - /aruco/amr/pose
      - /aruco/goal/pose
      - /amr/vel_raw
      - /amr/error

  # ── Logging ─────────────────────────────────────────────────────────────
  logging:
    log_dir: "/tmp/mission_orchestrator_logs"
    log_level: "INFO"                    # DEBUG | INFO | WARNING | ERROR
