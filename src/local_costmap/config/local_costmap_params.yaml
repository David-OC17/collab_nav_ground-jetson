local_costmap_node:
  ros__parameters:

    # Grid geometry
    resolution: 0.05          # metres per cell (5 cm)
    width: 4.0                # rolling window width  in metres
    height: 4.0               # rolling window height in metres

    # Frames
    global_frame: odom        # costmap lives in odom frame
    robot_base_frame: base_link

    # LIDAR obstacle layer
    max_obstacle_range: 3.5   # mark obstacles up to this range (m)
    raytrace_range: 5.0       # raytrace (clear) up to this range (m)
                              # should be >= max_obstacle_range

    # Inflation layer
    robot_radius: 0.2         # rover footprint radius (m) — tune to your rover
    inflation_radius: 0.55    # inflation bubble radius (m)
                              # rule of thumb: ~2-3x robot_radius
    cost_scaling_factor: 3.5  # higher = steeper cost dropoff from obstacle
                              # lower  = wider, gentler gradient

    # Update / publish rates
    update_frequency: 10.0    # Hz — how often to process scans
    publish_frequency: 5.0    # Hz — how often to publish OccupancyGrid